<!DOCTYPE html>

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Cole Snipes - Software Engineer, CS Student at University of Indianapolis. Building software that makes a difference." />
  <meta name="theme-color" content="#1a1b26" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#f8f9fc" media="(prefers-color-scheme: light)" />
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
  <title>Cole Snipes | Software Engineer</title>
  <script>
    (function(){
      try {
        const saved = localStorage.getItem('site-theme');
        const prefersLight = matchMedia && matchMedia('(prefers-color-scheme: light)').matches;
        const theme = saved || (prefersLight ? 'light' : 'dark');
        document.documentElement.setAttribute('data-theme', ['dark','light'].includes(theme) ? theme : 'dark');
      } catch(e) {}
    })();
  </script>
</head>

</body>
